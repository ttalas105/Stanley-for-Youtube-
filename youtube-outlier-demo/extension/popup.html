<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Outlier Demo</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        box-sizing: border-box;
        background: #111111;
        color: #f5f5f5;
        font: 14px/1.4 Arial, sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 10px;
        color: #c9c9c9;
      }

      code {
        color: #ffffff;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        background: #ffffff;
        color: #111111;
        font: 700 14px/1.2 Arial, sans-serif;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      #status {
        min-height: 20px;
        margin-top: 10px;
        color: #c9c9c9;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Outlier Demo</h1>
    <p>Open a YouTube channel page like <code>/@MrBeast/videos</code>.</p>
    <button id="scan" type="button">Scan current channel</button>
    <p id="status"></p>
    <p>Keep the local backend running on <code>localhost:3000</code>.</p>
    <script src="popup.js"></script>
  </body>
</html>
