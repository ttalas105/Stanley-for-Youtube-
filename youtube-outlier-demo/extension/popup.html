<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stanley for YouTube</title>
    <style>
      :root {
        color-scheme: dark;
        --canvas: #090e17;
        --surface: #0f1520;
        --surface-raised: #151c28;
        --border: #27303e;
        --border-strong: #3a4557;
        --text: #f4f6f9;
        --muted: #98a3b4;
        --quiet: #707b8d;
        --purple: #7163ee;
        --purple-hover: #8175f7;
        --purple-focus: #a69fff;
        --green: #58d49a;
        --danger: #ff95a6;
      }

      * { box-sizing: border-box; }

      body {
        width: 332px;
        margin: 0;
        overflow: hidden;
        background: var(--canvas);
        color: var(--text);
        font: 14px/1.5 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 404px;
        display: flex;
        flex-direction: column;
        padding: 18px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .brand > img {
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .brand-copy { min-width: 0; }

      .brand-copy strong,
      .brand-copy small { display: block; }

      .brand-copy strong {
        color: var(--text);
        font-size: 13px;
        font-weight: 720;
        letter-spacing: -.018em;
      }

      .brand-copy small {
        margin-top: 1px;
        color: var(--quiet);
        font-size: 10px;
        font-weight: 560;
      }

      .youtube-mark {
        width: 11px;
        height: 11px;
        margin-left: 2px;
        vertical-align: -2px;
      }

      .state-chip {
        min-width: 48px;
        min-height: 25px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 0 9px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--quiet);
        font-size: 10px;
        font-weight: 700;
        transition: border-color 180ms ease-out, background-color 180ms ease-out, color 180ms ease-out;
      }

      .state-chip::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5f6979;
        transition: background-color 180ms ease-out, box-shadow 180ms ease-out;
      }

      body[data-state="running"] .state-chip {
        border-color: #28523f;
        background: #101d19;
        color: #a8e5c8;
      }

      body[data-state="running"] .state-chip::before {
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(88, 212, 154, .12);
      }

      .hero {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 8px 0 3px;
        text-align: center;
      }

      .hero-inner {
        width: 100%;
        display: grid;
        justify-items: center;
      }

      .mascot {
        position: relative;
        width: 174px;
        height: 174px;
        display: grid;
        place-items: center;
      }

      .mascot::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(113, 99, 238, .18), rgba(113, 99, 238, .05) 52%, transparent 72%);
        transition: background 200ms ease-out;
      }

      .mascot img {
        position: relative;
        z-index: 1;
        width: 142px;
        height: 142px;
        object-fit: contain;
        transition: filter 220ms ease-out, transform 220ms cubic-bezier(.16, 1, .3, 1);
      }

      .activation-ring {
        position: absolute;
        width: 116px;
        height: 116px;
        border: 1px solid rgba(166, 159, 255, .58);
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
      }

      .hero h1 {
        margin: -4px 0 0;
        color: var(--text);
        font-size: 20px;
        line-height: 1.15;
        font-weight: 720;
        letter-spacing: -.025em;
      }

      #subtitle {
        max-width: 252px;
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
        text-wrap: pretty;
        transition: color 180ms ease-out;
      }

      .control { margin-top: 8px; }

      #start {
        width: 100%;
        min-height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        padding: 0 16px;
        border: 0;
        border-radius: 9px;
        background: var(--purple);
        color: #fff;
        cursor: pointer;
        font: 700 13px/1 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: background-color 160ms ease-out, color 160ms ease-out, transform 160ms ease-out, opacity 160ms ease-out;
      }

      #start:hover:not(:disabled) {
        background: var(--purple-hover);
        transform: translateY(-1px);
      }

      #start:active:not(:disabled) { transform: translateY(0); }

      #start:focus-visible {
        outline: 2px solid var(--purple-focus);
        outline-offset: 3px;
      }

      .power-icon,
      .loading-spinner {
        width: 17px;
        height: 17px;
        flex: 0 0 auto;
      }

      .power-icon { transition: transform 160ms ease-out; }
      #start:hover:not(:disabled) .power-icon { transform: scale(1.05); }

      .loading-spinner {
        display: none;
        border: 2px solid rgba(255, 255, 255, .34);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin .7s linear infinite;
      }

      #start[data-loading="true"] {
        opacity: .72;
        cursor: wait;
      }

      #start[data-loading="true"] .power-icon { display: none; }
      #start[data-loading="true"] .loading-spinner { display: block; }

      body[data-state="activating"] .mascot img,
      body[data-state="deactivating"] .mascot img {
        animation: stanley-state-change 300ms cubic-bezier(.16, 1, .3, 1) both;
      }

      body[data-state="activating"] .activation-ring {
        animation: activation-ring 390ms cubic-bezier(.16, 1, .3, 1) both;
      }

      body[data-state="running"] .mascot::before {
        background: radial-gradient(circle, rgba(88, 212, 154, .13), rgba(113, 99, 238, .05) 52%, transparent 72%);
      }

      body[data-state="running"] .mascot img {
        filter: drop-shadow(0 0 9px rgba(88, 212, 154, .16));
      }

      body[data-state="running"] #start {
        background: var(--surface-raised);
        color: #dce2eb;
        box-shadow: inset 0 0 0 1px var(--border-strong);
      }

      body[data-state="running"] #start:hover:not(:disabled) {
        background: #1a2230;
        color: #fff;
      }

      .supporting-text {
        margin: 9px 0 0;
        color: var(--quiet);
        font-size: 10px;
        text-align: center;
      }

      #status {
        max-width: 100%;
        min-height: 0;
        margin: 0;
        color: var(--danger);
        font-size: 10px;
        line-height: 1.4;
        text-align: center;
      }

      #status:not(:empty) { margin-top: 8px; }

      @keyframes spin { to { transform: rotate(360deg); } }

      @keyframes stanley-state-change {
        0% { transform: scale(1); }
        48% { transform: scale(.97); }
        100% { transform: scale(1.02); }
      }

      @keyframes activation-ring {
        0% { opacity: 0; transform: scale(.8); }
        30% { opacity: .78; }
        100% { opacity: 0; transform: scale(1.42); }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .01ms !important;
        }
      }
    </style>
  </head>
  <body data-state="idle">
    <main aria-labelledby="popup-title">
      <header class="topbar">
        <div class="brand">
          <img src="stanley-mascot-dashboard.png" alt="">
          <div class="brand-copy">
            <strong>Stanley</strong>
            <small>
              for YouTube
              <svg class="youtube-mark" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#ff1744" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8Z"/>
                <path fill="#fff" d="m9.6 15.6 6.3-3.6-6.3-3.6v7.2Z"/>
              </svg>
            </small>
          </div>
        </div>
        <span class="state-chip" id="state-indicator">Off</span>
      </header>

      <section class="hero">
        <div class="hero-inner">
          <div class="mascot" aria-hidden="true">
            <span class="activation-ring"></span>
            <img src="stanley-mascot-dashboard.png" alt="">
          </div>
          <h1 id="popup-title">See what stands out.</h1>
          <p id="subtitle">Turn Stanley on for channel outliers and analysis.</p>
        </div>
      </section>

      <div class="control">
        <button id="start" type="button" aria-pressed="false">
          <svg class="power-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v9m5.7-6.7a8 8 0 1 1-11.4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="start-label">Turn Stanley on</span>
          <span class="loading-spinner" aria-hidden="true"></span>
        </button>
        <p class="supporting-text">Works on YouTube channel pages.</p>
        <p id="status" role="status" aria-live="polite"></p>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
